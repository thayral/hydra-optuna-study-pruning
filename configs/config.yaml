defaults:
  - search: search
  - _self_

exp:
  seed: 42
  device: auto   # auto|cpu|cuda

data:
  root: ./data
  batch_size: 128
  num_workers: 2
  dataset: FashionMNIST
  subset_size : 20000  # a small subset for fast demo (e.g., 10k samples)

  norm: 
    FashionMNIST:
      mean: 0.286041
      std: 0.353024



model:
  name: cnn   
  hidden: 256
  dropout: 0.2

train:
  epochs: 10
  lr: 0.001
  weight_decay: 0.0

optuna:
  metric: val_acc # val_loss, val_loss

  sampler:
    name: tpe     # tpe|random
    seed: 42

  pruner:
    name: median  # median|none
    n_startup_trials: 5 
    n_warmup_steps: 3 # epochs
    interval_steps: 1

  study:
    name: mnist_pruning_demo_cnn_acc_1
    storage: "sqlite:///optuna.db"   # e.g. "sqlite:///optuna.db" or null for in-memory
    load_if_exists: False

  n_trials: 30

  enqueue:
    # Enqueue a couple of "known sane" baselines (optional but nice for demo)
    - { train.lr: 0.0005, model.dropout: 0.1 }
    - { train.lr: 0.001, model.dropout: 0.2 }